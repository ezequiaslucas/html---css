<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabelas</title>
    <style>
        body { 
            font-family: Arial, Helvetica, sans-serif;
        }
        table { 
            width: 400px;
            border-collapse: collapse;
        }
        tr#cor {
            background-color: rgba(128, 128, 128, 0.389);
        }
        td {
            border: 1px solid black;
            padding: 8px;
        }
        td.dado {
            background-color: darkseagreen;
        }
    </style>
</head>
<body>
    <h1>Minha primeira tabela</h1>
    <!-- 
        Hierarquia de tabelas simples 
        1- Table 
            2- TR
                3- TH 
                4- TD 
    -->
    <table>
        <tr id="cor"> <!-- primeira linha (table row) -->
            <td>A1</td>
            <td>B1</td> <!-- dados da tabela -->
            <td>C1</td>
        </tr>
        <tr> <!-- segunda linha da tabela --> 
            <td>A2</td>
            <td>B2</td> <!-- dados da tabela -->
            <td>C2</td>
        </tr>
        <tr> <!-- terceira linha da tabela -->
            <td>A3</td>
            <td class="dado">B3</td> <!-- dados da tabela -->
            <td>C3</td>
        </tr>
        <tr> <!-- quarta linha da tabela -->
            <td>A4</td>
            <td>B4</td> <!-- dados da tabela -->
            <td>C4</td>
        </tr>
    </table>
    <br>
    <hr>
    <h2>Tabela para estudos</h2>
    <table>
        <tr>
            <td>Palmeiras</td>
            <td>41</td>
            <td>18</td>
            <td>12</td>
            <td>05</td>
            <td>01</td>
        </tr>
        <tr>
            <td>Flamengo</td>
            <td>34</td>
            <td>17</td>
            <td>10</td>
            <td>04</td>
            <td>03</td>
        </tr>
    </table>
</body>
</html>
