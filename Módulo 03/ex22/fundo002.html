<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personalização dos fundos</title>
    <style>
        body {
            background-image: url("https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQQVgbBO94MxvAOuG1DRzLCnkCFZX5jkn2fsXh-VMAefGbc2PaBBazvjUU&s=10"); /* além de podermos definir imagens de nossos proprios diretorios, também podemos usar URLs de imagens externas */
            background-size: 300px 300px; /* define o tamanho da imagem de fundo, por padrão o tamanho da imagem terá seu tamanho normal caso essa propriedade não seja especificada */
            background-repeat: no-repeat; /* repeat, no-repeat, repeat-x, repeat-y (valores que podem ser usados) */
            background-position: center; /* define a posição da imagem de fundo, por padrão a imagem estará centralizada */
        }
    </style>
</head>

</body>
</html>
