<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alinhamento vertical</title>
    <style>
        section#container {
            background-image: url('imagens/target001.png');
            background-repeat: no-repeat;
            background-size: 100% 100%;
            position: relative;
            height: 500px;
            padding: 10px;
            background-color: purple;
        }
        article#conteudo {
            background-image: url('imagens/target001.png');
            background-repeat: no-repeat;
            background-size: 100% 100%;
            position: absolute;
            height: 200px;
            background-color: yellow;
            width: 400px;

            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%); /* faz com que o elemento seja centralizado por sua própria largura e altura através da transformação. */
            /* aqui vai um passo a passo para centralizar elementos: primeiro devemos definir a posição do elemento em relação ao seu contêiner, e depois aplicar a transformação para centralizá-lo. */
        }
    </style>
</head>
<body>
    <section id="container">
        <article id="conteudo">

        </article>
    </section>
</body>
</html>
