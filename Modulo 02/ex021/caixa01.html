<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modelo de caixas</title>
    <style>
        h1 { /* display: inline; */
            background-color: lightgray;
            height: 300px;
            width: 300px;
            border-width: 10px;
            border-style: solid;
            border-color: darkslategrey;
            padding: 10px; 
            /* shorthand padding:
                padding: 10px; (quatro lados iguais)
                padding: 10px 20px; (de cima e baixo: 10px / esquerda e direita: 20px)
            */
            margin: auto;
            /* shorthand margin:
                margin: cima, direita, baixo, esquerda; 
                margin: 10px; (quatro lado iguais)
                margin: 10px auto 20px auto; (centralizar, pois deixa as margens da esquerda e direita auto)
            */
        }
        a { /* display: block; */
            border-width: 3.5px;
            border-style: solid; /* solid, double, groove, dashed, dotted */
            border-color: red; 
            /* border: 3.5px solid red - shorthand */
        }
    </style>
</head>
<body>
    <h1>Exemplo de caixa box-level</h1>
    <p>Paragrafos também são exemplos de box-level, mas os <a href="#">links são exemplos de caixas inline-level</a> vamos ver como isso funciona</p>
</body>
</html>
