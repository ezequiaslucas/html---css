<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Desafio 14</title>
    <style>
        * {
            margin: 0;
            padding: 0;
        }
        :root {
            --letra: #ffffff;
            --fundo: gray;
        }
        body {
            font-family: Arial, Helvetica, sans-serif;
            padding: 10px;
        }
        table {
            margin: 5px auto 5px auto;
            border-collapse: collapse;
        }
        td, th {
            border: 2px solid black;
            padding: 10px;
        }
        .cinza {
            background-color: var(--fundo);
            color: var(--letra);
        }
    </style>
</head>
<body>
    <h1 style="text-align: center;">Desafio 14</h1>
    <section>
        <table>
            <caption style="margin-bottom: 5px;">Média de notas</caption>
            <tbody>
                <tr>
                    <th rowspan="2" class="cinza" scope="col">Área</th>
                    <th rowspan="2"  class="cinza" scope="col">Disciplinas</th>
                    <th colspan="2" class="cinza" scope="colgroup">Notas</th>
                    <th rowspan="2" class="cinza" scope="col">Média</th>
                </tr>
                <tr>
                    <th class="cinza" scope="col">Nota 1</th>
                    <th class="cinza" scope="col">Nota 2</th>
                </tr>
                <tr>
                    <th rowspan="4" scope="rowgroup">Exatas</th>
                    <td>Matemática</td>
                    <td>0.0</td>
                    <td>0.0</td>
                    <td>0.0</td>
                </tr>
                <tr>
                    <td>Física</td>
                    <td>0.0</td>
                    <td>0.0</td>
                    <td>0.0</td>
                </tr>
                <tr>
                    <td>Química</td>
                    <td>0.0</td>
                    <td>0.0</td>
                    <td>0.0</td>
                </tr>
                <tr>
                    <td>Biologia</td>
                    <td>0.0</td>
                    <td>0.0</td>
                    <td>0.0</td>
                </tr>
                <tr>
                    <th class="cinza" colspan="4" scope="row">Média de exatas</th>
                    <td  class="cinza">0.0</td>
                </tr>
                <tr>
                    <th rowspan="2" scope="rowgroup">Humanas</th>
                    <td>Historia</td>
                    <td>0.0</td>
                    <td>0.0</td>
                    <td>0.0</td>
                </tr>
                <tr>
                    <td>Geografia</td>
                    <td>0.0</td>
                    <td>0.0</td>
                    <td>0.0</td>
                </tr>
                <tr>
                    <th colspan="4" class="cinza" scope="row">Média de Humanas</th>
                    <td class="cinza">0.0</td>
                </tr>
            </tbody>
        </table>
    </section>
</body>
</html>
